          - text: student.
        - generic [ref=e345]: est. 2018
      - generic [ref=e346]:
        - paragraph [ref=e347]: Choosing a university is, for most families in India, the most significant financial and emotional decision they will make together. It deserves more than a glossy brochure and a follow-up call.
        - paragraph [ref=e348]: "Edutech Solutions was founded on a contrarian premise: that the student is the client, even though the university pays the bill. When those interests align, we take the case. When they don't, we tell the family — and walk away from the commission."
        - paragraph [ref=e349]: That's the discipline behind our four-university partnership with UPES, Graphic Era, Uttaranchal University and Dev Bhoomi. Each institution carries a different academic identity and a different placement profile. Counselling is the work of telling you which of those four matches your goals — and which doesn't.
        - paragraph [ref=e350]: We do this work in plain language, in your local language if you'd like, and on your timeline. The phone call is free. The advice is honest. The decision, always, is yours.
