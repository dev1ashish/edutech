      - generic [ref=e40]:
        - heading "Take your First Step towards success!" [level=2] [ref=e41]
        - paragraph [ref=e42]: Choosing the right university is an important decision for any student, for the professional success one aspires for in their lives, depends on this very decision. Graphic Era (Deemed-to-be-University) offers its prospective students more than 85 UG, PG and Doctoral programmes to choose from, spread across various domains such as Engineering, Computer Application, Management, Commerce, Life Sciences, Food Technology, Hospitality, Paramedical, Humanities and Social Sciences, and more.
        - generic [ref=e43]:
          - strong [ref=e44]: "Note:"
          - text: Graphic Era (Deemed-to-be-University) doesn't outsource its admission process. The application form on this page reaches the official admissions team directly.
      - img "Students at a Graphic Era University campus event" [ref=e47]
