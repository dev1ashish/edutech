        - paragraph [ref=e127]: Graphic Era Common Entrance Test (GECET) is the university's own online aptitude test, conducted in multiple windows between February and July 2026. The test covers Mathematics, Physics, Chemistry, Logical Reasoning and English. 90 minutes, 75 questions, conducted online.
        - list [ref=e128]:
          - listitem [ref=e129]: "✓ Three test windows: Feb, May and July 2026"
          - listitem [ref=e130]: ✓ Negative marking · 4 marks per correct answer, −1 wrong
