    - generic [ref=e76]:
      - heading "Complete Admission process by Paying the fee" [level=2] [ref=e77]
      - paragraph [ref=e78]: Five steps from interest to confirmed seat. Most candidates complete the entire flow in 7–10 working days.
      - list [ref=e79]:
        - listitem [ref=e80]:
          - generic [ref=e81]: "01"
          - generic [ref=e82]:
            - heading "Choose your Course of Interest" [level=3] [ref=e83]
            - paragraph [ref=e84]: This is the most important step of your application process since there are more than 85 programmes to choose from at UG, PG and PhD level. Considering your core skills, aptitude, passion and career goals, talk to our counsellor and choose the right programme.
        - listitem [ref=e85]:
          - generic [ref=e86]: "02"
          - generic [ref=e87]:
            - heading "Check Eligibility & Apply Online" [level=3] [ref=e88]
            - paragraph [ref=e89]: Each programme has a defined eligibility criterion based on the qualifying examination. Fill the application form on this page — you will be guided through the upload of your 10th, 12th and qualifying-exam mark sheets.
        - listitem [ref=e90]:
          - generic [ref=e91]: "03"
          - generic [ref=e92]:
            - heading "Appear for GECET / Submit Score" [level=3] [ref=e93]
            - paragraph [ref=e94]: Most undergraduate engineering programmes require GECET (Graphic Era Common Entrance Test) — a 90-minute online test. JEE Main, CUET, GATE, MAT and CAT scores are also accepted for relevant programmes.
        - listitem [ref=e95]:
          - generic [ref=e96]: "04"
          - generic [ref=e97]:
            - heading "Counselling & Provisional Offer" [level=3] [ref=e98]
            - paragraph [ref=e99]: Shortlisted candidates are invited for counselling. The provisional offer letter is sent within 48 hours of counselling along with the fee schedule and scholarship slab.
        - listitem [ref=e100]:
          - generic [ref=e101]: "05"
          - generic [ref=e102]:
            - heading "Pay Fee & Confirm Seat" [level=3] [ref=e103]
            - paragraph [ref=e104]: Pay the first-instalment tuition fee online to confirm your seat. Hostel allotment and orientation schedule are shared once the fee is received.
