      - paragraph [ref=e292]:
        - text: Dev Bhoomi Uttarakhand University Dehradun (DBUU Dehradun) established Under
        - strong [ref=e293]: Uttarakhand Uthan Samiti
        - text: is a leading educational institution recognized by the UGC under
        - strong [ref=e294]: sections 2(f) of the UGC Act, 1956,
        - text: along with several statutory bodies across India. The University has been awarded as the Best Emerging University by the Asian Education Conclave and Best Placement & Excellence in Academics in North India by the Ministry of Human Resources Development.
        - text: Spread across 42 acres of green campus, DBUU stands as one of the
        - strong [ref=e295]: best university in Dehradun
        - text: ", offering"
        - strong [ref=e296]: 120+ programs across 12 schools
        - text: in diverse fields such as Engineering, Management, Law, Pharmacy, Computer Applications, Animation, Design, Hotel Management, Architecture, Paramedical Sciences, Nursing, Hospital Administration, Fashion Design, Mass Communication, Journalism, Allied Sciences, Agriculture, Aerospace Engineering, Aviation, and Airport Management. With advanced laboratories, modern classrooms, industry-collaboration centres, and dedicated research & innovation facilities, DBUU ensures a holistic and experiential learning environment. The University holds accreditations and recognitions from
        - strong [ref=e297]: UGC, PCI, INC, BCI, UAU, IPC, and CoA,
        - text: reflecting its commitment to delivering quality higher education with integrity and excellence.
